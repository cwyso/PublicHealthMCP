[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
# Start permissive; expand the rule set as the codebase matures.
# E/W: pycodestyle errors and warnings
# F:   pyflakes (unused imports, undefined names, etc.)
# I:   isort (import ordering)
select = ["E", "F", "W", "I"]
